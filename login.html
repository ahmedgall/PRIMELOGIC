<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Logic | نظام النخبة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #007bff; --dark-bg: #030303; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #0b1a36 0%, #030303 50%);
            color: #ffffff; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; margin: 0; overflow-x: hidden;
        }
        .prime-card { 
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(30px); 
            border: 1px solid rgba(0, 123, 255, 0.2); border-radius: 2.5rem; 
            width: 100%; max-width: 450px; padding: 2.5rem; 
            box-shadow: 0 0 80px rgba(0, 0, 0, 1), 0 0 30px rgba(0, 123, 255, 0.1);
        }
        .tab-btn { transition: 0.3s; border-bottom: 2px solid transparent; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-color: var(--main-blue); color: var(--main-blue); }
        .input-prime { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 123, 255, 0.1); 
            padding: 1.1rem; border-radius: 1.2rem; width: 100%; text-align: center; color: white; transition: 0.4s;
        }
        .input-prime:focus { border-color: var(--main-blue); outline: none; background: rgba(0, 123, 255, 0.05); }
        
        /* تنسيق قائمة اختيار الدولة */
        .select-prime {
            background: rgba(20, 20, 25, 0.95); border: 1px solid rgba(0, 123, 255, 0.1); 
            color: white; padding: 0 1rem; border-radius: 1.2rem; outline: none;
            cursor: pointer; font-weight: bold; font-size: 0.9rem; text-align: center;
        }
        .select-prime option { background: #0a0a0f; color: white; }

        .btn-prime { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white; font-weight: 700; padding: 1.1rem; border-radius: 1.2rem; 
            width: 100%; transition: 0.3s; border: none; cursor: pointer;
        }
        .btn-prime:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(20, 20, 30, 0.9); border: 1px solid var(--main-blue);
            padding: 1rem 2rem; border-radius: 1rem; z-index: 9999; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex; align-items: center; gap: 10px; pointer-events: none; opacity: 0;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="toast">
        <span id="toastMsg" class="text-sm font-bold"></span>
    </div>

    <div class="prime-card">
        <div class="text-center mb-8">
            <h1 class="font-['Orbitron'] text-4xl font-black italic uppercase">Prime<span class="text-blue-600">Logic</span></h1>
        </div>

        <div id="tabsHeader" class="flex justify-around mb-8 border-b border-white/5">
            <button onclick="switchTab('login')" id="loginTab" class="tab-btn active pb-3 px-6 font-bold">دخول</button>
            <button onclick="switchTab('register')" id="regTab" class="tab-btn pb-3 px-6 font-bold">حساب جديد</button>
        </div>

        <div id="inputSection" class="space-y-5">
            <div id="loginFields" class="space-y-5">
                <div class="flex gap-2" dir="ltr">
                    <select id="loginCountry" class="select-prime">
                        <option value="20">🇪🇬 +20</option>
                        <option value="964">🇮🇶 +964</option>
                        <option value="966">🇸🇦 +966</option>
                        <option value="971">🇦🇪 +971</option>
                        <option value="965">🇰🇼 +965</option>
                        <option value="974">🇶🇦 +974</option>
                        <option value="968">🇴🇲 +968</option>
                        <option value="962">🇯🇴 +962</option>
                        <option value="973">🇧🇭 +973</option>
                        <option value="212">🇲🇦 +212</option>
                    </select>
                    <input type="tel" id="loginPhone" class="input-prime flex-1" placeholder="رقم الهاتف بدون أصفار في الأول" dir="ltr">
                </div>
                <button onclick="handleLogin()" id="loginBtn" class="btn-prime shadow-lg shadow-blue-900/20">طلب كود الدخول</button>
            </div>

            <div id="registerFields" class="hidden space-y-5">
                <input type="text" id="regName" class="input-prime" placeholder="الاسم الكامل">
                <div class="flex gap-2" dir="ltr">
                    <select id="regCountry" class="select-prime">
                        <option value="20">🇪🇬 +20</option>
                        <option value="964">🇮🇶 +964</option>
                        <option value="966">🇸🇦 +966</option>
                        <option value="971">🇦🇪 +971</option>
                        <option value="965">🇰🇼 +965</option>
                        <option value="974">🇶🇦 +974</option>
                        <option value="968">🇴🇲 +968</option>
                        <option value="962">🇯🇴 +962</option>
                        <option value="973">🇧🇭 +973</option>
                        <option value="212">🇲🇦 +212</option>
                    </select>
                    <input type="tel" id="regPhone" class="input-prime flex-1" placeholder="رقم الواتساب بدون أصفار في الأول" dir="ltr">
                </div>
                <input type="text" id="regPromo" class="input-prime border-dashed border-blue-500/30" placeholder="كود الإحالة / رقم التليفون الداعي (اختياري)" dir="ltr">
                <button onclick="sendBtnClick()" id="sendBtn" class="btn-prime shadow-lg shadow-blue-900/20">إرسال كود التفعيل</button>
            </div>
        </div>

        <div id="otpSection" class="hidden space-y-5 text-center">
            <p class="text-blue-400 text-sm mb-2">أدخل الكود المرسل للواتساب</p>
            <input type="text" id="otpInput" class="input-prime text-2xl tracking-[8px]" placeholder="000000" maxlength="6">
            <button id="verifyBtn" class="btn-prime">تأكيد الكود</button>
            <button onclick="resetFlow()" class="text-xs text-white/30 underline mt-4">تغيير الرقم</button>
        </div>

        <div class="mt-10 text-center opacity-10">
            <p class="text-[7px] tracking-[5px] uppercase">Powered by Fixaa Arab Software</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpy4ZUAtE7tKFsMJocnsywZCYAOM3CAMA",
            authDomain: "ososo-9ff14.firebaseapp.com",
            projectId: "ososo-9ff14",
            storageBucket: "ososo-9ff14.firebasestorage.app",
            messagingSenderId: "753501605833",
            appId: "1:753501605833:web:475d02965fc1bdc2732218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const API_URL = "https://api.ultramsg.com/instance171381/messages/chat";
        const TOKEN = "5fh5hfytsg5mml9n";

        let generatedOTP = "";
        let currentPhone = "";
        let currentName = "";
        let currentPromo = ""; // لتخزين كود الإحالة الموثق أثناء العملية
        let flowMode = ""; 

        window.notify = (msg, type = 'info') => {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.className = 'show'; 
            toast.style.borderColor = (type === 'error') ? '#ef4444' : '#007bff';
            setTimeout(() => toast.className = '', 3000);
        };

        window.switchTab = (tab) => {
            resetFlow();
            if(tab === 'login') {
                document.getElementById('loginFields').classList.remove('hidden');
                document.getElementById('registerFields').classList.add('hidden');
                document.getElementById('loginTab').classList.add('active');
                document.getElementById('regTab').classList.remove('active');
            } else {
                document.getElementById('loginFields').classList.add('hidden');
                document.getElementById('registerFields').classList.remove('hidden');
                document.getElementById('loginTab').classList.remove('active');
                document.getElementById('regTab').classList.add('active');
            }
        };

        window.resetFlow = () => {
            document.getElementById('inputSection').classList.remove('hidden');
            document.getElementById('otpSection').classList.add('hidden');
            document.getElementById('tabsHeader').style.opacity = "1";
            document.getElementById('tabsHeader').style.pointerEvents = "auto";
            if(document.getElementById('loginBtn')) document.getElementById('loginBtn').disabled = false;
            if(document.getElementById('sendBtn')) document.getElementById('sendBtn').disabled = false;
        };

        function formatInternationalPhone(countryCode, inputPhone) {
            let cleanPhone = inputPhone.replace(/\D/g, ''); 
            cleanPhone = cleanPhone.replace(/^0+/, ''); 
            
            if (cleanPhone.startsWith(countryCode)) {
                cleanPhone = cleanPhone.substring(countryCode.length);
            }
            
            return countryCode + cleanPhone;
        }

        // تمرير متغير الـ promo للدالة لتجهيزه قبل الحفظ
        window.sendOTP = async (mode, phone, name = "", promo = "") => {
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            flowMode = mode;
            currentPhone = phone;
            currentName = name;
            currentPromo = promo;

            const params = new URLSearchParams({
                "token": TOKEN, "to": phone,
                "body": `*PRIME LOGIC*\nكود التحقق الخاص بك هو: *${generatedOTP}*`
            });

            try {
                const response = await fetch(API_URL, { method: 'POST', body: params });
                if(!response.ok) throw new Error("UltraMsg Fail");
                
                notify("تم إرسال الكود للواتساب");
                
                document.getElementById('inputSection').classList.add('hidden');
                document.getElementById('otpSection').classList.remove('hidden');
                document.getElementById('tabsHeader').style.opacity = "0.3";
                document.getElementById('tabsHeader').style.pointerEvents = "none";
                
                document.getElementById('verifyBtn').onclick = window.completeProcess;
            } catch (e) {
                notify("خطأ في إرسال رسالة الواتساب", "error");
                resetFlow();
            }
        };

        window.handleLogin = async () => {
            const countryCode = document.getElementById('loginCountry').value;
            const phoneInput = document.getElementById('loginPhone').value.trim();
            if(!phoneInput) return notify("أدخل رقم الهاتف", "error");
            
            const formattedPhone = formatInternationalPhone(countryCode, phoneInput);
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;

            try {
                const snap = await getDoc(doc(db, "users", formattedPhone));
                if(snap.exists()) {
                    await window.sendOTP('login', formattedPhone);
                } else {
                    notify("الرقم غير مسجل، أنشئ حساباً أولاً", "error");
                    btn.disabled = false;
                }
            } catch(e) {
                notify("خطأ في الاتصال بالسيرفر", "error");
                btn.disabled = false;
            }
        };

        window.sendBtnClick = async () => {
            const name = document.getElementById('regName').value.trim();
            const countryCode = document.getElementById('regCountry').value;
            const phoneInput = document.getElementById('regPhone').value.trim();
            let promoInput = document.getElementById('regPromo').value.trim();
            
            if(!name || !phoneInput) return notify("أكمل البيانات", "error");
            
            const formattedPhone = formatInternationalPhone(countryCode, phoneInput);
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;

            try {
                // 1. فحص هل التليفون مسجل قبل كده
                const snap = await getDoc(doc(db, "users", formattedPhone));
                if(snap.exists()) {
                    notify("الرقم مسجل بالفعل!", "error");
                    btn.disabled = false;
                    return;
                }

                // 2. الـ Logic الجديد: فحص برومو كود الإحالة لو موجود
                let validPromo = "";
                if(promoInput) {
                    // تنظيف البرومو كود تحسباً لو دخل رقم عادي مش دولي، السيستم ينظفه تلقائي
                    let cleanPromo = promoInput.replace(/\D/g, '').replace(/^0+/, '');
                    
                    // التحقق لو كتب رقمه الشخصي كإحالة
                    if(cleanPromo === phoneInput.replace(/\D/g, '').replace(/^0+/, '') || cleanPromo === formattedPhone) {
                        notify("لا يمكنك استخدام رقمك ككود إحالة!", "error");
                        btn.disabled = false;
                        return;
                    }

                    // البحث في الداتابيز: هل الكود (رقم الداعي) موجود؟
                    // بنجرب نبحث عنه بالـ formattedPhone النظيف أو كـ ID مباشر في Firestore
                    let promoFound = false;
                    const promoSnap = await getDoc(doc(db, "users", cleanPromo));
                    
                    if (promoSnap.exists()) {
                        validPromo = cleanPromo;
                        promoFound = true;
                    } else {
                        // محاولة فحص لو الكود مخزن بـ مفتاح دولي كاملا بـ 20 أو غيره
                        // بنلف على الاحتمالات الشائعة كود مصر أو المدخل الحالي
                        const fallbackPromo = cleanPromo.startsWith(countryCode) ? cleanPromo : countryCode + cleanPromo;
                        const promoSnapFallback = await getDoc(doc(db, "users", fallbackPromo));
                        if(promoSnapFallback.exists()) {
                            validPromo = fallbackPromo;
                            promoFound = true;
                        }
                    }

                    if(!promoFound) {
                        notify("كود الإحالة غير صحيح أو غير موجود", "error");
                        btn.disabled = false;
                        return;
                    }
                }

                // إرسال البيانات للدالة لبدء الـ OTP
                await window.sendOTP('register', formattedPhone, name, validPromo);

            } catch(e) {
                notify("خطأ في فحص البيانات", "error");
                btn.disabled = false;
            }
        };

        window.completeProcess = async () => {
            const input = document.getElementById('otpInput').value.trim();
            if(input !== generatedOTP) return notify("الكود غير صحيح", "error");

            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.disabled = true;

            if(flowMode === 'register') {
                const trialEndDate = new Date();
                
                // الـ Logic المكافأة: لو مسجل بكود إحالة صحيح ياخد 14 يوم، لو عادي 7 أيام
                if(currentPromo) {
                    trialEndDate.setDate(trialEndDate.getDate() + 14);
                } else {
                    trialEndDate.setDate(trialEndDate.getDate() + 7);
                }

                try {
                    await setDoc(doc(db, "users", currentPhone), {
                        name: currentName, 
                        phone: currentPhone,
                        referred_by: currentPromo ? currentPromo : null, // ربط الحساب بصاحب الإحالة
                        trial_end: Timestamp.fromDate(trialEndDate),
                        createdAt: serverTimestamp()
                    });
                } catch(e) { 
                    verifyBtn.disabled = false;
                    return notify("خطأ في حفظ البيانات بقاعدة البيانات", "error"); 
                }
            }

            localStorage.setItem('prime_user_phone', currentPhone);
            notify(currentPromo ? "تم التفعيل بنجاح! حصلت على 14 يوم تجريبي 🎉" : "تم التحقق بنجاح.. جاري الدخول");
            setTimeout(() => window.location.href = 'index.html', 1500);
        };
    </script>
</body>
</html>
