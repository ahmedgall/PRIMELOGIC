<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Logic | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050508; color: #fff; min-height: 100vh; padding: 2rem; }
        .glass-card { background: rgba(15, 15, 25, 0.9); border: 1px solid rgba(0, 123, 255, 0.2); border-radius: 1.5rem; }
        .input-admin { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem; border-radius: 0.8rem; color: white; outline: none; }
        .input-admin:focus { border-color: #007bff; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        tr { background: rgba(255,255,255,0.02); transition: 0.3s; }
        tr:hover { background: rgba(0, 123, 255, 0.05); }
        th { padding: 1rem; text-align: right; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 1rem; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="font-['Orbitron'] text-2xl font-black text-blue-500 uppercase">Control Panel</h1>
                <p class="text-gray-500 text-xs">إدارة مستخدمي نظام Prime Logic</p>
            </div>
            <div class="bg-blue-600/10 px-4 py-2 rounded-xl border border-blue-500/20 text-blue-400 font-bold">
                Admin Mode
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- قسم التفعيل السريع -->
            <div class="glass-card p-6 h-fit sticky top-8">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2"><i class="fas fa-bolt text-yellow-500"></i> تفعيل اشتراك</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">رقم هاتف المستخدم (ID العمليات)</label>
                        <input type="text" id="targetPhone" class="input-admin w-full" placeholder="2010xxxxxxxx">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-2">عدد أيام التجديد</label>
                        <input type="number" id="daysToAdd" class="input-admin w-full" placeholder="مثلاً: 30">
                    </div>
                    <button onclick="activateUser()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all">تحديث الصلاحية</button>
                </div>
            </div>

            <!-- جدول المستخدمين -->
            <div class="lg:col-span-2 glass-card p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold">قائمة الأعضاء</h3>
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-500 text-xs"></i>
                        <input type="text" id="userSearch" onkeyup="filterTable()" class="input-admin pl-10 text-xs" placeholder="بحث بالاسم أو الرقم...">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table id="userTable">
                        <thead>
                            <tr>
                                <th>المستخدم</th>
                                <th>رقم الهاتف</th>
                                <th>تاريخ الانتهاء</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="usersList">
                            <!-- البيانات ستظهر هنا -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, Timestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBpy4ZUAtE7tKFsMJocnsywZCYAOM3CAMA",
            authDomain: "ososo-9ff14.firebaseapp.com",
            projectId: "ososo-9ff14",
            storageBucket: "ososo-9ff14.firebasestorage.app",
            messagingSenderId: "753501605833",
            appId: "1:753501605833:web:475d02965fc1bdc2732218"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // جلب المستخدمين وعرضهم
        async function loadUsers() {
            const q = query(collection(db, "users"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            const listBody = document.getElementById('usersList');
            listBody.innerHTML = '';

            querySnapshot.forEach((doc) => {
                const user = doc.data();
                const expiry = user.trial_end ? user.trial_end.toDate() : new Date();
                const isExpired = expiry < new Date();

                listBody.innerHTML += `
                    <tr class="user-row">
                        <td>
                            <div class="font-bold text-sm">${user.name}</div>
                            <div class="text-[10px] text-blue-400 font-mono">${user.customId}</div>
                        </td>
                        <td class="text-xs text-gray-400">${user.phone}</td>
                        <td class="text-xs">${expiry.toLocaleDateString('ar-EG')}</td>
                        <td>
                            <span class="px-2 py-1 rounded text-[9px] font-bold ${isExpired ? 'bg-red-500/20 text-red-500' : 'bg-green-500/20 text-green-500'}">
                                ${isExpired ? 'منتهي' : 'نشط'}
                            </span>
                        </td>
                    </tr>
                `;
            });
        }

        // تفعيل الاشتراك
        window.activateUser = async () => {
            const phone = document.getElementById('targetPhone').value.trim();
            const days = parseInt(document.getElementById('daysToAdd').value);

            if(!phone || !days) return alert("يرجى إكمال البيانات");

            const newExpiry = new Date();
            newExpiry.setDate(newExpiry.getDate() + days);

            try {
                const userRef = doc(db, "users", phone);
                await updateDoc(userRef, {
                    trial_end: Timestamp.fromDate(newExpiry),
                    status: "premium" // تحديث الحالة ليصبح مستخدم مدفوع
                });
                alert("تم تفعيل الاشتراك بنجاح لمدة " + days + " يوم");
                loadUsers(); // إعادة تحميل الجدول
            } catch (e) {
                alert("خطأ: تأكد من صحة رقم الهاتف المسجل");
            }
        };

        // نظام الفلترة
        window.filterTable = () => {
            const input = document.getElementById("userSearch").value.toLowerCase();
            const rows = document.querySelectorAll(".user-row");
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(input) ? "" : "none";
            });
        }

        loadUsers();
    </script>
</body>
</html>
